project:
  type: website
  output-dir: _site
  resources:
    - scripts.js
    - resources
    - img/

website:
  title: "артём"
  draft-mode: unlinked
  site-url: "https://rtviii.xyz"
  favicon: "./img/BTNBlink.webp"
  search: false
  sidebar:
    - id: mmcif
      title: "Toward a Modern Foundation"
      style: "docked"
      align: left
      collapse-level: 2
      contents:
        - text: "Overview"
          href: posts/mmcif/index.qmd
        - text: "1. Problems with mmCIF"
          href: posts/mmcif/01-problems.qmd
        - text: "2. Architecture"
          href: posts/mmcif/02-architecture.qmd
        - text: "3. Composition"
          href: posts/mmcif/03-composition.qmd
        - text: "4. Annotations and computed passes"
          href: posts/mmcif/04-annotations-and-passes.qmd
        - text: "5. Open questions"
          href: posts/mmcif/05-open-questions.qmd
        - text: "Appendix: black-box data"
          href: posts/mmcif/06-black-box-data.qmd
        - text: "Appendix: modularity examples"
          href: posts/mmcif/07-modularity-examples.qmd

format:
  html:
    theme: litera
    css:
      - styles/custom.css
      - styles/scrollbar-fix.css
    grid:
      sidebar-width: 280px
      body-width: 900px
      margin-width: 260px
    # include-after-body: scripts.js  # Pointing to the file created above
    include-in-header:
      text: |
        <script src="/scripts.js"></script>
        <script src="https://unpkg.com/@popperjs/core@2"></script>
        <script src="https://unpkg.com/tippy.js@6"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">