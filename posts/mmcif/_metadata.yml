page-layout: custom
title-block-style: none
css:
  - /styles/homepage.css
bibliography: references.bib
csl: ../../styles/numeric-superscript.csl
link-citations: true
# Per-chapter reference lists are suppressed: every chapter links into the
# single references page (references.qmd) instead. citenum.lua rewrites each
# in-text citation to its GLOBAL number (key position in references.bib) and
# repoints it at that page. references.qmd overrides suppress-bibliography back
# to false so the one consolidated list renders there.
suppress-bibliography: true
# On-page citation hover is off because the bibliography no longer lives on the
# chapter pages; clicking a citation goes to the references page.
citations-hover: false
crossrefs-hover: true
toc: true
toc-depth: 3
toc-location: right
page-navigation: false
execute:
  freeze: auto
format:
  html:
    link-external-newwindow: true

# TikZ figures rendered inline by pandoc-ext/diagram. The shared preamble
# (palette + tikzset for L0..L4, Lgroup, Lop, etc.) lives here so each
# `{.tikz}` block in the qmd files can carry just the tikzpicture body.
# The bus figure adds its own \tikzset overrides at the top of its block.
filters:
  - diagram
  # citenum.lua runs before Quarto's built-in citeproc: it resolves every
  # [@key] into a global-numbered link to the references page, so citeproc then
  # emits no per-chapter bibliography. The references page builds its list from
  # `nocite` instead.
  - citenum.lua

diagram:
  cache: true
  engine:
    tikz:
      execpath: pdflatex
      preamble-file: data/_tikz-preamble.tex

# Collapsible H2/H3 behavior + current-chapter highlight + in-page section
# list injection live in /scripts.js, scoped to /posts/mmcif/ via a path check.
# Inline citation styling (numeric superscript) is enforced via CSS in
# styles/homepage.css — the CSL above only produces plain numbers.
