page-layout: custom
title-block-style: none
css:
  - /styles/homepage.css
bibliography: references.bib
csl: ../../styles/numeric-superscript.csl
link-citations: true
citations-hover: true
crossrefs-hover: true
toc: true
toc-depth: 3
toc-location: right
page-navigation: false
execute:
  freeze: auto
format:
  html:
    link-external-newwindow: true
# Collapsible H2/H3 behavior + current-chapter highlight + in-page section
# list injection live in /scripts.js, scoped to /posts/mmcif/ via a path check.
# Inline citation styling (numeric superscript) is enforced via CSS in
# styles/homepage.css — the CSL above only produces plain numbers.
