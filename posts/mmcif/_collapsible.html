<style>
  /* Collapsible subsections for this blog post only */
  main#quarto-document-content .collapsible-heading {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: baseline;
    gap: 0.4em;
  }
  main#quarto-document-content .collapsible-heading::before {
    content: "\25BE"; /* down-pointing triangle */
    display: inline-block;
    transition: transform 0.15s ease;
    font-size: 0.75em;
    color: #888;
    flex-shrink: 0;
  }
  main#quarto-document-content .collapsible-heading.is-collapsed::before {
    transform: rotate(-90deg);
  }
  main#quarto-document-content .collapsible-body.is-hidden {
    display: none;
  }
</style>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var article = document.querySelector("main#quarto-document-content");
    if (!article) return;

    // Wrap H2/H3 sections so they collapse. For an H2, siblings are collected
    // until the next H2 (H3s inside fall into the H2 wrapper and are also
    // independently collapsible). For an H3, siblings are collected until the
    // next H2 or H3.
    function wrapHeading(heading, stopTags) {
      var siblings = [];
      var el = heading.nextElementSibling;
      while (el && stopTags.indexOf(el.tagName) === -1) {
        siblings.push(el);
        el = el.nextElementSibling;
      }
      if (siblings.length === 0) return;

      var wrapper = document.createElement("div");
      wrapper.className = "collapsible-body";
      siblings.forEach(function (s) { wrapper.appendChild(s); });
      heading.insertAdjacentElement("afterend", wrapper);
      heading.classList.add("collapsible-heading");

      heading.addEventListener("click", function () {
        wrapper.classList.toggle("is-hidden");
        heading.classList.toggle("is-collapsed");
      });
    }

    // Process H3 first so H3 wrappers are created before H2 absorbs them as
    // a single sibling. Either order works because the H2 wrapper simply
    // contains the H3 wrapper as one of its children.
    article.querySelectorAll("h3").forEach(function (h) {
      wrapHeading(h, ["H2", "H3"]);
    });
    article.querySelectorAll("h2").forEach(function (h) {
      wrapHeading(h, ["H2"]);
    });
  });
</script>
